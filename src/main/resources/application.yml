spring:
  application:
    name: javacom-api
  main:
    log-startup-info: false

  datasource:
    url: jdbc:h2:mem:javacomdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: admin
    password: 123

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

javacom:
  security:
    jwt:
      secret: "U3VwZXJTZWNyZXRLZXlGb3JKYXZhQ29tQVBJVGhhdElzTG9uZ0Vub3VnaEZvckhTMjU2QWxnb3JpdGhtMjU2Yml0cyE="
      expiration-minutes: 120
      issuer: javacom-api

logging:
  level:
    root: WARN
    br.dev.javacom: INFO
  pattern:
    console: "%clr(%-5level){highlight} %clr(%logger{0}){cyan} %msg%n"
