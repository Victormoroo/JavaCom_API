spring:
  application:
    name: javacom-api
  main:
    log-startup-info: false

  datasource:
    url: jdbc:h2:mem:javacomdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: admin
    password: 123

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    persist-authorization: true
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-expand-depth: 2
    syntax-highlight:
      activated: true
      theme: monokai
  show-actuator: false
  group-configs:
    - group: javacom-api-v1
      paths-to-match: /api/**
      display-name: JavaCom API v1

javacom:
  security:
    jwt:
      secret: "${JAVACOM_JWT_SECRET:U3VwZXJTZWNyZXRLZXlGb3JKYXZhQ29tQVBJVGhhdElzTG9uZ0Vub3VnaEZvckhTMjU2QWxnb3JpdGhtMjU2Yml0cyE=}"
      expiration-minutes: ${JAVACOM_JWT_EXPIRATION_MINUTES:120}
      issuer: javacom-api

logging:
  level:
    root: WARN
    br.dev.javacom: INFO
  pattern:
    console: "%clr(%-5level){highlight} %clr(%logger{0}){cyan} %msg%n"
